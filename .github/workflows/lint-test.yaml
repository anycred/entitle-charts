# =============================================================================
# Lint and Test Charts
# =============================================================================
# Runs on every push to any branch:
#   1. Lint changed charts (yamllint + Yamale schema validation)
#   2. Credential-validation tests (cluster-free, dummy tokens)
#
# Full install/e2e testing lives in the private anycred/entitle-charts-tests
# repo and gates chart PRs via the agent-tests check.
# =============================================================================
name: Lint and Test Charts

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.12.1

      # Python is required because ct lint runs Yamale and yamllint
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.10"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      # Cluster-free credential-validator tests — dummy tokens, no secrets needed.
      - name: Run credential-validation tests
        if: steps.list-changed.outputs.changed == 'true'
        run: bash charts/entitle-agent/ci/credential-validation-test.sh

      # Note: ct install (smoke test) is not used because the agent deployment
      # has Python-based health probes that require the real agent image.
      # Full install testing lives in anycred/entitle-charts-tests.
