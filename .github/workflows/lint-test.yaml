# =============================================================================
# Lint and Test Charts
# =============================================================================
# Runs on every push to any branch:
#   1. Lint changed charts (yamllint + Yamale schema validation)
#   2. Smoke test: ct install with minimal values (no real credentials)
#   3. Integration tests: 3 scenarios with real agent token (requires secret)
# =============================================================================
name: Lint and Test Charts

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.12.1

      # Python is required because ct lint runs Yamale and yamllint
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.10"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      # Spin up a kind cluster for install testing.
      - name: Create kind cluster
        uses: helm/kind-action@94729529f85113b88f4f819c17ce61382e6d8478 # v1.2.0
        if: steps.list-changed.outputs.changed == 'true'

      - name: Add dependency chart repos
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          helm repo add datadog https://helm.datadoghq.com
          helm repo update

      # Smoke test: ct install uses ci/default-values.yaml.
      # No real credentials — validates helm install succeeds (pods will be Pending).
      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml

  # ---------------------------------------------------------------------------
  # Integration tests — require ENTITLE_AGENT_TOKEN secret
  # Tests all 3 install scenarios with a real agent token against a kind cluster.
  # Skipped on forks or when the secret is not available.
  # ---------------------------------------------------------------------------
  integration-test:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.12.1

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.10"

      - name: Create kind cluster
        uses: helm/kind-action@94729529f85113b88f4f819c17ce61382e6d8478 # v1.2.0

      - name: Build chart dependencies
        run: |
          helm repo add datadog https://helm.datadoghq.com
          helm repo update
          helm dependency build charts/entitle-agent

      - name: Check for agent token secret
        id: check-secret
        run: |
          if [ -n "${{ secrets.ENTITLE_AGENT_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ENTITLE_AGENT_TOKEN secret not set — skipping integration tests"
          fi

      - name: Run integration tests
        if: steps.check-secret.outputs.available == 'true'
        env:
          ENTITLE_AGENT_TOKEN: ${{ secrets.ENTITLE_AGENT_TOKEN }}
        run: bash charts/entitle-agent/ci/integration-test.sh
