apiVersion: v2
name: entitle-agent
description: An Entitle agent Helm chart for Kubernetes
type: application
icon: https://app.entitle.io/favicon.ico

# Breaking change in v2.0.0: defaults changed (MISSING_CUSTOMER_DATA removed,
# kmsType defaults to kubernetes_secret_manager, token/imageCredentials no longer required).
# GCP platform field renamed from platform.gke to platform.gcp.
# See DOPS-434 for full changelog.
# v2.5.0 (ICH-4992): fail helm install/upgrade with a clear message when imageCredentials
# or datadogApiKey cannot be resolved from agent.token or explicit values, instead of
# deploying into a broken state.
# v2.6.0: optionally pull the monitoring-agent image through the on-prem registry proxy.
# v2.7.0: extract-pull-secret hook parses the token with jq (handles multi-line
# token JSON) instead of a line-oriented sed, fixing 401 ImagePullBackOff on the
# agent.secretRef install path.
# v2.8.0: make the Datadog logs sidecar image configurable via
# `datadog.image.repository` + `datadog.image.tag` (defaults to
# `gcr.io/datadoghq/agent:latest`), so customers mirroring images into a
# private registry can override it. The routing-v1 proxy rewrite is
# preserved. The unused `datadog.registry` value has been removed.
# v2.8.1: remove the ci/ test scaffolding (no chart behavior change).
# v2.8.2 (DOPS-678): fix 401 ImagePullBackOff on the agent.secretRef + routing v1
# path. The secretRef path can't rewrite the Deployment image to the proxy host
# (token is opaque at render time), so the extract-pull-secret hook no longer
# re-keys the pull secret to the proxy host — it keeps the token's imageCredentials
# keyed to the upstream registry host that the un-rewritten image is pulled from.
# v2.9.0 (DOPS-678): also pull the agent image through the proxy (routing v1+), keyed
# to the proxy host; the agent and monitoring-agent images share one proxy URL.
# v2.9.1: Remove _defaults from values.yaml - it was internal chart logic that
# caused --reuse-values upgrade failures. Templates now use hardcoded defaults.
# v2.9.2: Fix --reuse-values upgrades from v1.x - use dig to safely access
# agent.secretRef.name and imagePullSecret.name (introduced in v2.0.0).
# v2.10.0: Add ENTITLE_EXPLICITLY_SET_IMAGE_CREDENTIALS_HASH env var - SHA256 hash
# of explicitly set imageCredentials (not extracted from token).
# v2.10.1: Fix --reuse-values upgrades from pre-v2.8.0 releases - safely access
# datadog.image.repository/tag (introduced in v2.8.0) in the datadogImage helper.
# v2.10.2: Fix nil pointer in serviceAccountAnnotations when platform.mode=gcp on
# --reuse-values upgrades from releases without a platform.gke block (e.g. v1.1.0):
# `default` evaluates eagerly, so the gke fallback now goes through safe accessors.
# v2.10.3: Same fix for the platform.gcp side - the oldest versions (v1.0.x) had no
# platform.gcp block and defaulted platform.mode to "gcp" for every install, so
# --reuse-values upgrades from v1.0.x nil-panicked on .Values.platform.gcp.serviceAccount.
# v2.10.4 (DOPS-963): fix routing v1 image rewrite with agent.secretRef. Previously,
# the secretRef path could not rewrite the Deployment image to the proxy host because
# the token was opaque at render time. Now a post-install/upgrade hook extracts
# routing + platform fields from the secretRef token and patches the Deployment to
# use agent.{platform}.entitle.io when routing=v1. The hook also re-keys the pull
# secret to the proxy host. Only runs when using the default agent.image.repository
# (custom repos bypass the rewrite to allow direct pulls from private mirrors).
version: 2.10.4
appVersion: "1.0.0"

dependencies:
  - name: datadog
    condition: datadog.enabled
    version: "2.30.16"
    repository: https://helm.datadoghq.com
