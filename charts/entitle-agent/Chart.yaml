apiVersion: v2
name: entitle-agent
description: An Entitle agent Helm chart for Kubernetes
type: application
icon: https://app.entitle.io/favicon.ico

# Breaking change in v2.0.0: defaults changed (MISSING_CUSTOMER_DATA removed,
# kmsType defaults to kubernetes_secret_manager, token/imageCredentials no longer required).
# GCP platform field renamed from platform.gke to platform.gcp.
# See DOPS-434 for full changelog.
# v2.5.0 (ICH-4992): fail helm install/upgrade with a clear message when imageCredentials
# or datadogApiKey cannot be resolved from agent.token or explicit values, instead of
# deploying into a broken state.
# v2.6.0: optionally pull the monitoring-agent image through the on-prem registry proxy.
# v2.7.0: extract-pull-secret hook parses the token with jq (handles multi-line
# token JSON) instead of a line-oriented sed, fixing 401 ImagePullBackOff on the
# agent.secretRef install path.
# v2.8.0 (DOPS-678): also pull the agent image through the proxy (routing v1+), keyed
# to the proxy host; the agent and monitoring-agent images share one proxy URL.
# v2.8.1: remove the ci/ test scaffolding (no chart behavior change).
# v2.8.2 (DOPS-678): fix 401 ImagePullBackOff on the agent.secretRef + routing v1
# path. The secretRef path can't rewrite the Deployment image to the proxy host
# (token is opaque at render time), so the extract-pull-secret hook no longer
# re-keys the pull secret to the proxy host — it keeps the token's imageCredentials
# keyed to the upstream registry host that the un-rewritten image is pulled from.
version: 2.8.2
appVersion: "1.0.0"

dependencies:
  - name: datadog
    condition: datadog.enabled
    version: "2.30.16"
    repository: https://helm.datadoghq.com
