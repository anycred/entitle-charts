# =============================================================================
# Chart Testing (ct install) — minimal values for install smoke test
# =============================================================================
# This file is automatically used by `ct install` to validate that the chart
# installs successfully in a kind cluster. Uses a dummy token so helm install
# succeeds without real credentials. Pods will not start — that's expected.
#
# Real integration tests (with actual credentials) run separately via
# the integration-test job using ci/test-*.yaml values files.
# =============================================================================

agent:
  # Dummy token: decodes to {"test":"test","imageCredentials":"e30="} — no real credentials.
  # imageCredentials must be present so the chart's render-time credential validator
  # (entitle-agent.validateRequiredCredentials) passes during `ct lint`. datadog.enabled
  # is false below, so a datadogApiKey is not required.
  # Chart creates the agent secret but pods stay Pending (expected).
  token: "eyJ0ZXN0IjoidGVzdCIsImltYWdlQ3JlZGVudGlhbHMiOiJlMzA9In0="
  image:
    repository: busybox
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Disable Datadog entirely for smoke test
datadog:
  enabled: false
  sidecarLogs: false
