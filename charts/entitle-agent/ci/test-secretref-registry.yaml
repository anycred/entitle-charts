# =============================================================================
# Integration test: SecretRef + own registry (Scenario 3)
# Pre-requisite: CI creates "entitle-agent-ci-token" and "entitle-agent-ci-registry"
# secrets before install. The hook extracts datadogApiKey but skips docker-login.
# =============================================================================

kmsType: kubernetes_secret_manager

platform:
  mode: native

agent:
  secretRef:
    name: entitle-agent-ci-token
  image:
    repository: ghcr.io/anycred/entitle-agent
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

imagePullSecret:
  name: entitle-agent-ci-registry

datadog:
  enabled: false
  sidecarLogs: false

global:
  environment: ci
