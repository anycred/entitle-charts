# =============================================================================
# Integration test: SecretRef only (Scenario 2)
# Pre-requisite: CI creates "entitle-agent-ci-token" secret before install.
# The hook extracts imageCredentials and datadogApiKey from the token secret.
# =============================================================================

kmsType: kubernetes_secret_manager

platform:
  mode: native

agent:
  secretRef:
    name: entitle-agent-ci-token
  image:
    repository: ghcr.io/anycred/entitle-agent-qa
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

datadog:
  enabled: false
  sidecarLogs: false

global:
  environment: qa
