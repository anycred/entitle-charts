{{/*
Pre-install/upgrade hook: extracts imageCredentials and datadogApiKey from
the agent token secret and creates docker-login + datadog secrets.

This enables the secretRef path to work without manually extracting
credentials from the token. The hook reads the pre-existing secret,
decodes the BASE64_CONFIGURATION wrapper, and extracts the fields.

Only runs when agent.secretRef.name is set and agent.token is not provided.
The referenced secret must exist before the chart is deployed.
*/}}
{{- $hasToken := and .Values.agent.token (ne .Values.agent.token "MISSING_CUSTOMER_DATA") -}}
{{- if and .Values.agent.secretRef.name (not $hasToken) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "entitle-agent.fullname" . }}-hook
  labels:
    {{- include "entitle-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "entitle-agent.fullname" . }}-hook
  labels:
    {{- include "entitle-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "entitle-agent.fullname" . }}-hook
  labels:
    {{- include "entitle-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "entitle-agent.fullname" . }}-hook
subjects:
  - kind: ServiceAccount
    name: {{ include "entitle-agent.fullname" . }}-hook
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "entitle-agent.fullname" . }}-extract-pull-secret
  labels:
    {{- include "entitle-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "entitle-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "entitle-agent.fullname" . }}-hook
      restartPolicy: Never
      containers:
      - name: extract
        image: bitnami/kubectl:latest
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e

          NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
          DOCKER_SECRET="{{ include "entitle-agent.fullname" . }}-docker-login"
          DD_SECRET="{{ include "entitle-agent.fullname" . }}-datadog-secret"

          echo "Reading token from secret {{ .Values.agent.secretRef.name }}"

          # Read the token JSON from the mounted secret file
          TOKEN_JSON=$(cat "/secret/{{ include "entitle-agent.agentSecretKey" . }}")

          # Unwrap BASE64_CONFIGURATION to get the raw token blob
          B64_CONFIG=$(echo "$TOKEN_JSON" | sed 's/.*BASE64_CONFIGURATION":"\([^"]*\).*/\1/')

          if [ -z "$B64_CONFIG" ] || [ "$B64_CONFIG" = "$TOKEN_JSON" ]; then
            echo "ERROR: Could not extract BASE64_CONFIGURATION from secret"
            exit 1
          fi

          # Decode to get the full token JSON
          FULL_TOKEN=$(echo "$B64_CONFIG" | base64 -d)

          # --- Docker login secret ---
          {{- $hasImageCreds := and .Values.imageCredentials (ne .Values.imageCredentials "MISSING_CUSTOMER_DATA") }}
          {{- if not (or .Values.imagePullSecret.name $hasImageCreds) }}
          IMAGE_CREDS=$(echo "$FULL_TOKEN" | sed 's/.*"imageCredentials":"\([^"]*\)".*/\1/')

          if [ -n "$IMAGE_CREDS" ] && [ "$IMAGE_CREDS" != "$FULL_TOKEN" ]; then
            echo "Creating docker-login secret: ${DOCKER_SECRET}"
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${DOCKER_SECRET}
            namespace: ${NAMESPACE}
            labels:
              app.kubernetes.io/managed-by: Helm
            annotations:
              meta.helm.sh/release-name: {{ .Release.Name }}
              meta.helm.sh/release-namespace: {{ .Release.Namespace }}
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: ${IMAGE_CREDS}
          EOF
          else
            echo "WARNING: No imageCredentials found in token."
          fi
          {{- else }}
          echo "Skipping docker-login (imagePullSecret.name or imageCredentials provided)"
          {{- end }}

          # --- Datadog API key secret ---
          DD_API_KEY=$(echo "$FULL_TOKEN" | sed 's/.*"datadogApiKey":"\([^"]*\)".*/\1/')

          if [ -n "$DD_API_KEY" ] && [ "$DD_API_KEY" != "$FULL_TOKEN" ]; then
            echo "Creating Datadog secret: ${DD_SECRET}"
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${DD_SECRET}
            namespace: ${NAMESPACE}
            labels:
              app.kubernetes.io/managed-by: Helm
            annotations:
              meta.helm.sh/release-name: {{ .Release.Name }}
              meta.helm.sh/release-namespace: {{ .Release.Namespace }}
          stringData:
            api-key: "${DD_API_KEY}"
          EOF
          else
            echo "WARNING: No datadogApiKey found in token."
          fi

          echo "Done."
        volumeMounts:
        - name: token-secret
          mountPath: /secret
          readOnly: true
      volumes:
      - name: token-secret
        secret:
          secretName: {{ .Values.agent.secretRef.name }}
{{- end }}
