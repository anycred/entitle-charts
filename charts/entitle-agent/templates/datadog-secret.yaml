{{/*
Datadog API key secret.
- Token path: created with real datadogApiKey extracted at render time.
- SecretRef path: created as placeholder (pre-install hook), then patched by
  the extract Job with real values from the token secret.
*/}}
{{- $ddApiKey := include "entitle-agent.datadogApiKey" . -}}
{{- $hasToken := and .Values.agent.token (ne .Values.agent.token "MISSING_CUSTOMER_DATA") -}}
{{- if or $ddApiKey .Values.agent.secretRef.name }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "entitle-agent.fullname" . }}-datadog-secret
  labels:
  {{- include "entitle-agent.labels" . | nindent 4 }}
  {{- if and .Values.agent.secretRef.name (not $hasToken) }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
stringData:
  api-key: {{ $ddApiKey | default "placeholder" | quote }}
{{- end }}
