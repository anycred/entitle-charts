{{- include "entitle-agent.validateAgentVersion" . -}}
{{- include "entitle-agent.validateRequiredCredentials" . -}}
{{- include "entitle-agent.validateCustomCa" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "entitle-agent.fullname" . }}
  labels:
    {{- include "entitle-agent.labels" . | nindent 4 }}
    environment: {{ .Values.global.environment }}
    tags.datadoghq.com/env: {{ .Values.global.environment }}
    tags.datadoghq.com/service: {{ include "entitle-agent.fullname" . }}-{{ .Values.global.environment }}
    tags.datadoghq.com/version: {{ include "entitle-agent.imageTag" . }}
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      app: {{ include "entitle-agent.fullname" . }}
      {{- include "entitle-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/docker-login: {{ include (print $.Template.BasePath "/docker-login.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        checksum/datadog-config: {{ include (print $.Template.BasePath "/datadog-configmap.yaml") . | sha256sum }}
        ad.datadoghq.com/{{ include "entitle-agent.fullname" . }}.logs: '[{"source": "{{ include "entitle-agent.fullname" . }}"}]'
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ include "entitle-agent.fullname" . }}
        {{- include "entitle-agent.selectorLabels" . | nindent 8 }}
        environment: {{ .Values.global.environment }}
        tags.datadoghq.com/env: {{ .Values.global.environment }}
        tags.datadoghq.com/service: {{ include "entitle-agent.fullname" . }}-{{ .Values.global.environment }}
        tags.datadoghq.com/version: {{ include "entitle-agent.imageTag" . }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if eq .Values.platform.mode "azure" }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      initContainers:
      {{- if and ( not .Values.datadog.enabled )  .Values.datadog.sidecarLogs }}
      # Datadog native sidecar — starts first, stays running to collect logs
      # from the healthcheck init container and the main agent container.
      - name: datadog-agent
        image: {{ include "entitle-agent.datadogImage" . }}
        imagePullPolicy: Always
        restartPolicy: Always
        envFrom:
          - configMapRef:
              name: {{ include "entitle-agent.fullname" . }}-datadog-proxy
              optional: true
        env:
          - name: DD_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "entitle-agent.fullname" . }}-datadog-secret
                key: api-key
          - name: DD_TAGS
            value: {{.Values.datadog.datadog.tags | quote}}
          - name: DD_HOSTNAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: DD_LOGS_ENABLED
            value: "true"
          - name: DD_LOG_LEVEL
            value: "debug"
          # Disables Kubernetes metrics collection (DO NOT REMOVE)
          - name: KUBERNETES
            value: ""
          - name: KUBERNETES_SERVICE_PORT
            value: ""
          # Disables Kubernetes metrics collection (DO NOT REMOVE)
        volumeMounts:
          - name: datadog-configmap
            mountPath: /conf.d/python.d
          - name: entitle-agent-logs
            mountPath: /var/log/entitle-agent
            readOnly: true
      {{- end }}
      # Healthcheck validators must exit 0 before the main agent container starts.
      # This guarantees the agent never consumes Kafka messages in an invalid state.
      - name: {{ include "entitle-agent.fullname" . }}-healthcheck
        image: {{ include "entitle-agent.agentImageRepository" . }}:{{ include "entitle-agent.resolvedImageTag" . }}
        imagePullPolicy: Always
        command:
          - python
          - scripts/healthcheck/healthcheck.py
        env:
        {{- include "entitle-agent.agentEnv" . | nindent 8 }}
        {{- with .Values.agent.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if or (not .Values.datadog.enabled) (include "entitle-agent.customCaEnabled" .) }}
        volumeMounts:
        {{- if not .Values.datadog.enabled }}
          - mountPath: /var/log/entitle-agent
            name: entitle-agent-logs
        {{- end }}
        {{- if include "entitle-agent.customCaEnabled" . }}
          - name: custom-ca
            mountPath: {{ include "entitle-agent.customCaMountPath" . }}
            readOnly: true
        {{- end }}
        {{- end }}
      containers:
      - name: {{ include "entitle-agent.fullname" . }}
        image: {{ include "entitle-agent.agentImageRepository" . }}:{{ include "entitle-agent.resolvedImageTag" . }}
        imagePullPolicy: Always
        env:
        {{- include "entitle-agent.agentEnv" . | nindent 8 }}
        {{- with .Values.agent.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if or (not .Values.datadog.enabled) (include "entitle-agent.customCaEnabled" .) }}
        volumeMounts:
        {{- if not .Values.datadog.enabled }}
          - mountPath: /var/log/entitle-agent
            name: entitle-agent-logs
        {{- end }}
        {{- if include "entitle-agent.customCaEnabled" . }}
          - name: custom-ca
            mountPath: {{ include "entitle-agent.customCaMountPath" . }}
            readOnly: true
        {{- end }}
        {{- end }}
        livenessProbe:
          exec:
            command:
              - python
              - /src/liveness_check/liveness_check.py
          failureThreshold: 1
          initialDelaySeconds: 20
          periodSeconds: 60
          successThreshold: 1
          timeoutSeconds: 10
      {{- $imageCreds := include "entitle-agent.imageCredentials" . -}}
      {{- $imagePullSecretName := include "entitle-agent.imagePullSecretNameValue" . -}}
      {{- $secretRefName := include "entitle-agent.secretRefNameValue" . -}}
      {{- if or $imagePullSecretName $imageCreds $secretRefName }}
      imagePullSecrets:
        - name: {{ include "entitle-agent.imagePullSecretName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: entitle-agent-logs
          emptyDir: {}
        {{- if not .Values.datadog.enabled }}
        - name: datadog-configmap
          configMap:
            name: {{ include "entitle-agent.fullname" . }}-datadog-config
        {{- end }}
        {{- if include "entitle-agent.customCaEnabled" . }}
        - name: custom-ca
          {{- if include "entitle-agent.customCaSecretNameValue" . }}
          secret:
            secretName: {{ include "entitle-agent.customCaSecretNameValue" . }}
          {{- else }}
          configMap:
            name: {{ include "entitle-agent.customCaConfigMapNameValue" . }}
          {{- end }}
        {{- end }}
      serviceAccountName: {{ include "entitle-agent.serviceAccountName" .}}
