# ConfigMap with proxy env vars — shared by DaemonSet (via envFrom) and Sidecar (via envFrom)
# URL is dynamically generated from token: http://agent.{platform}.entitle.io:8080
{{- $routing := include "entitle-agent.extractedRouting" . -}}
{{- $proxyUrl := include "entitle-agent.proxyUrl" . -}}
{{- if and $routing (ne $routing "v0") $proxyUrl }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "entitle-agent.fullname" . }}-datadog-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "entitle-agent.labels" . | nindent 4 }}
data:
  # DD-specific proxy vars — only affects Datadog agent's own outbound traffic
  # (metrics, logs, APM → datadoghq.com). Internal checks (kubelet, kube API)
  # use standard HTTP libs (requests/urllib3) which are NOT proxied.
  DD_PROXY_HTTP: {{ $proxyUrl | quote }}
  DD_PROXY_HTTPS: {{ $proxyUrl | quote }}
{{- end }}
